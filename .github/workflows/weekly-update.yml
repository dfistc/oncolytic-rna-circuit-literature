name: Weekly literature update

on:
  schedule:
    - cron: "15 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update PubMed candidates
        run: |
          python scripts/update_literature.py
          python scripts/render_site.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly literature candidates"
          file_pattern: "data/literature.csv index.html"
